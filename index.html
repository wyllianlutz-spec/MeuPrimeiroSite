<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Meu BLOG</title>
</head>
<body>
    <header>
        <h1>Meu blog</h1>
        <p>Wyllian</p>
        <p>Vou compartilhar com você sobre carros</p>
    </header>
    <main>
        <h2>Meu primeiro Post</h2>
        <p>Boas vindas ao meu blog</p>
        <img src="https://i.pinimg.com/564x/65/2e/04/652e043854d8074fe072d8b020623e98.jpg"
        alt="caravan ss">
        <button>👍<span>0</span></button>
    </main>
</body>
<script>
    const botoes = document.querySelectALL("button");
    botoes.forEach(function(botao){
        botao.addEventListener("click", botaoclicado);
        function botaoclicado(){
            let texto = botao.querySelector("span");
            texto,textContent++;
        }
    })
    </script>
</html>
